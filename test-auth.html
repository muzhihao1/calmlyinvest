<!DOCTYPE html>
<html>
<head>
  <title>Test Authentication</title>
</head>
<body>
  <h1>Test Authentication for 279838958@qq.com</h1>
  
  <button onclick="testLogin()">Test Login</button>
  <button onclick="testPortfolios()">Test Get Portfolios</button>
  <button onclick="testFullFlow()">Test Full Flow</button>
  
  <pre id="output"></pre>
  
  <script>
    const output = document.getElementById('output');
    let authToken = '';
    
    async function testLogin() {
      try {
        const response = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: '279838958@qq.com',
            password: 'muzhihao12'
          })
        });
        
        const data = await response.json();
        authToken = data.token;
        output.textContent = 'Login successful!\n' + JSON.stringify(data, null, 2);
        
        // Store for future use
        localStorage.setItem('token', data.token);
        localStorage.setItem('userId', '8e82d664-5ef9-47c1-a540-9af664860a7c');
        localStorage.setItem('numericUserId', '2');
        
      } catch (error) {
        output.textContent = 'Login failed: ' + error.message;
      }
    }
    
    async function testPortfolios() {
      try {
        const response = await fetch('http://localhost:3000/api/portfolios/8e82d664-5ef9-47c1-a540-9af664860a7c', {
          headers: { 
            'Authorization': 'Bearer ' + authToken,
            'Accept': 'application/json'
          }
        });
        
        const data = await response.json();
        output.textContent = 'Portfolios:\n' + JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = 'Get portfolios failed: ' + error.message;
      }
    }
    
    async function testFullFlow() {
      output.textContent = 'Starting full flow test...\n';
      
      // 1. Login
      await testLogin();
      output.textContent += '\n\n--- Step 1: Login complete ---\n';
      
      // 2. Get portfolios
      await new Promise(resolve => setTimeout(resolve, 1000));
      await testPortfolios();
      output.textContent += '\n\n--- Step 2: Get portfolios complete ---\n';
      
      // 3. Get portfolio details
      const portfolioId = 2; // Your portfolio ID
      const portfolioResponse = await fetch(`http://localhost:3000/api/portfolio/${portfolioId}`, {
        headers: { 
          'Authorization': 'Bearer ' + authToken,
          'Accept': 'application/json'
        }
      });
      const portfolioData = await portfolioResponse.json();
      output.textContent += '\n\n--- Step 3: Portfolio details ---\n' + JSON.stringify(portfolioData, null, 2);
      
      // 4. Get stock holdings
      const stocksResponse = await fetch(`http://localhost:3000/api/portfolio/${portfolioId}/stocks`, {
        headers: { 
          'Authorization': 'Bearer ' + authToken,
          'Accept': 'application/json'
        }
      });
      const stocksData = await stocksResponse.json();
      output.textContent += '\n\n--- Step 4: Stock holdings ---\n' + JSON.stringify(stocksData, null, 2);
      
      // 5. Get risk metrics
      const riskResponse = await fetch(`http://localhost:3000/api/portfolio/${portfolioId}/risk`, {
        headers: { 
          'Authorization': 'Bearer ' + authToken,
          'Accept': 'application/json'
        }
      });
      const riskData = await riskResponse.json();
      output.textContent += '\n\n--- Step 5: Risk metrics ---\n' + JSON.stringify(riskData, null, 2);
      
      output.textContent += '\n\n✅ All tests passed!';
    }
  </script>
</body>
</html>
